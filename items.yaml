items:
  "IWJ_1":
    name: "IWJ_1"
    title: "Water Jug"
    short: "A robust and powerful Water Jug that holds more water than an empty container"
    deep: >
      With additional hidden compartments, this small but mighty container can
      hold a lot more than you'd think. It is compact enough to keep the water's
      temperature optimal for consumption by plants, creatures and Cryptonauts
      alike.
    category: "Water"
    image: "https://ttm.mypinata.cloud/ipfs/QmTBu5fTJgZ71bY4S9SN6APfsjpmhrC6Wx9SZieSvQEzLt"

  "IMSB_2":
    name: "IMSB_2"
    title: "Moon Strawberry"
    short: "Covered in pinks and yellows, this moon berry decorates the bushes near the bare trees."
    deep: >
      Covered in pinks and yellows, this moon berry decorates the bushes near the
      bare trees. Cryptonauts find them just as tasty as they look.
    category: "Food"
    image: "https://ttm.mypinata.cloud/ipfs/QmZJXVCNKgp3CVFyTDavui9J5Xy9WMEWQnXb89XeNhbzq6"

  "IMRB_3":
    name: "IMRB_3"
    title: "Moon Raspberry"
    short: "An aquamarine berry that grows on the bushes by the craters."
    deep: >
      An aquamarine berry that grows on the bushes by the craters. The name
      “Nature's Candy” does not do this extremely sweet fruit justice.
    category: "Food"
    image: "https://ttm.mypinata.cloud/ipfs/QmYkoe6xctHqD1JdZp9JgxYfd6Dw4rHav34ePtaSgCnTg1"

  "IMP_4":
    name: "IMP_4"
    title: "Moon Pear"
    short: "Moon Pear in category Food."
    deep: >
      This pear may not be as bright as its fruity counterparts; however, it is
      nutrient dense and offers essential vitamins. It can be found on the
      Spreading tree forms of the moon.
    category: "Food"
    image: "https://ttm.mypinata.cloud/ipfs/QmSSHr2qyMKK2WarC5KzWrPxQvsMkr8kpBeim738veHsqs"

  "IMA_5":
    name: "IMA_5"
    title: "Moon Apple"
    short: "Moon Apple in category Food."
    deep: >
      Found on the lush Pyramidal tree forms of the moon, the Moon Apple is a
      vibrant fruit that offers a quick boost of energy. If what they say about an
      apple being more effective than a cup of coffee is true, then the Moon Apple
      is more effective than three.
    category: "Food"
    image: "https://ttm.mypinata.cloud/ipfs/Qma4VAdfiYhyPuN5qKfWaqTypTFF9k9uCJKBswhJnfLT7e"

  "IPPMF_6":
    name: "IPPMF_6"
    title: "Purple Moon Fish"
    short: "The purple moon fish found in lakes has green fins and spots."
    deep: >
      The purple moon fish found in lakes has green fins and spots. These tiny
      accents provide a saltier taste, regardless of the usual sweetness of lake
      fish.
    category: "Food"
    image: "https://ttm.mypinata.cloud/ipfs/Qmedho67Jcxa3s27bKiuLfuk2u8MK1YyH4N4E2KnrwYDEP"

  "IPKMF_7":
    name: "IPKMF_7"
    title: "Pink Moon Fish"
    short: "The Pink Moon Fish, also found in lakes, is the highest source of Energy."
    deep: >
      The Pink Moon Fish, also found in lakes, is the highest source of Energy. It
      is much sweeter than the purple, due to its yellow fins and neon trimmings.
    category: "Food"
    image: "https://ttm.mypinata.cloud/ipfs/QmNkpuQ5gLeQnEPCMDhMeRjqKt3s5K1xVPwyjmtgFPvdus"

  "ISMB_8":
    name: "ISMB_8"
    title: "Special Moon Berry"
    short: "Special Moon Berry in category Special Food."
    deep: >
      This berry can be spotted near the outer edges of the lakes and is
      specifically for the Moon Creatures. They favor the bitterness of the yellow
      seeds in this magical fruit.
    category: "Special Food"
    image: "https://ttm.mypinata.cloud/ipfs/QmPFpGX6m6b5b4eXtEvrXtUnJmTm3aRP6xPaiVqcQZePnQ"

  "ISMF_9":
    name: "ISMF_9"
    title: "Special Moon Fish"
    short: "A sweet and salty fish, only found in rivers."
    deep: >
      A sweet and salty fish, only found in rivers. River fish is for Moon
      Creatures in particular, as they enjoy the unusual, acquired taste of it.
    category: "Special Food"
    image: "https://ttm.mypinata.cloud/ipfs/QmW6ireQHMUkkHuwXpkPLG5moJJ2tz9E7Xpq4ejh8CKFqN"

  "ISMP_10":
    name: "ISMP_10"
    title: "Special Moon Plant"
    short: "Special Moon Plant in category Special Food."
    deep: >
      Flowering up the walls of the caves, the Special Moon Plant is for the Moon
      Creatures and offers them the highest source of Special Energy. The plant is
      so vibrant and beautiful that it is no surprise it holds poisonous
      qualities, but not for the Moon Creatures. They have a unique digestive
      system that can kill any harmful ingredients and convert it to Special
      Energy.
    category: "Special Food"
    image: "https://ttm.mypinata.cloud/ipfs/QmTpNYtFmG7SAXK18ukbA9ehM48sB3H8y36CKiE8cZ1gHG"

  "IMSS_11":
    name: "IMSS_11"
    title: "Moon Strawberry Seed"
    short: "Moon Strawberry Seed in category Moon Seed."
    deep: >
      This heart-shaped kernel has the potential to grow a plant that will produce
      up to five quarts of Moon Strawberries a season. Pretty impressive for the
      moon's smallest seed.
    category: "Moon Seed"
    image: "https://ttm.mypinata.cloud/ipfs/QmcAddVCfJRpTBr2kSdtjrHW6eXG31UKVWkNwjpeuzixAN"

  "IMRS_12":
    name: "IMRS_12"
    title: "Moon Raspberry Seed"
    short: "Moon Raspberry Seed in category Moon Seed."
    deep: >
      With a watermelon-like appearance, the Moon Raspberry Seed produces the
      moon's sweetest fruit. The seeds themselves can be enjoyed, but it is only
      for those with a serious sweet tooth. Wow, a seed sweeter than candy…only on
      the moon!
    category: "Moon Seed"
    image: "https://ttm.mypinata.cloud/ipfs/QmaEnYhCcyJVU1WxZgVVKSNMBbviLFGs99xnP7jtth2WTD"

  "IMPS_13":
    name: "IMPS_13"
    title: "Moon Pear Seed"
    short: "Moon Pear Seed in category Moon Seed."
    deep: >
      This seed may produce the most nutrient-dense fruit in the universe;
      however, the seed itself is poisonous and extremely harmful to all living
      things. This is why this pretty little thing must be handled with caution.
    category: "Moon Seed"
    image: "https://ttm.mypinata.cloud/ipfs/QmZrf772FKkUMaoAhmgQA8jrWuhPvVyAPtDsFcHiTZiQdR"

  "IMAS_14":
    name: "IMAS_14"
    title: "Moon Apple Seed"
    short: "It's hard to tell that this tiny seed will eventually grow into a stunning Pyramidal tree."
    deep: >
      It's hard to tell that this tiny seed will eventually grow into a stunning
      Pyramidal tree. The bright red shell hides its potential, but eventually,
      its stunning blue soul sprouts through and flourishes.
    category: "Moon Seed"
    image: "https://ttm.mypinata.cloud/ipfs/QmSodoVoddT4T7ELYyDHUVK68EfeAELibqdS4ye27LVMfQ"

  "ISMBS_15":
    name: "ISMBS_15"
    title: "Special Moon Berry Seed"
    short: "Special Moon Berry Seed in category Special Moon Seed."
    deep: >
      Looking like a rare gem, the Special Moon Berry Seed offers the pungent
      taste of a typical berry and a smell like no other. Its distinct odour can
      only be tamed with salt.
    category: "Special Moon Seed"
    image: "https://ttm.mypinata.cloud/ipfs/QmdyZgQe2xYH2V3V8DEkar79VoWfnycdyh7akooRqqkF5o"

  "ISMPS_16":
    name: "ISMPS_16"
    title: "Special Moon Plant Seed"
    short: "This is not like any other seed."
    deep: >
      This is not like any other seed. This seed brings its planter good luck.
      Legend has it that the universe rewards those who take care of the ecosystem
      and since this plant offers the most nourishment to the creatures, the
      planter reaps what they sow in more ways than one.
    category: "Special Moon Seed"
    image: "https://ttm.mypinata.cloud/ipfs/QmQ1CDkEeaocHwGXC31reBq9foRLseNhSjJuRX6vBhaKKf"

  "IFR_17":
    name: "IFR_17"
    title: "Fishing Rod"
    short: "Top of the line rod with an easy to use hook for bait."
    deep: >
      Top of the line rod with an easy to use hook for bait. Get ready to reel in
      the biggest and finest catches!
    category: "Utility"
    image: "https://ttm.mypinata.cloud/ipfs/QmczRQd2PRJ8oTY88Pw9Z34Zyixpui4BkDm6vWFkgJQ9JU"

  "IWC_18":
    name: "IWC_18"
    title: "Water Can"
    short: "Water Can in category Utility."
    deep: >
      Offering water to the Moon and Special Moon Seeds in the Greenhouses, this
      can holds a lot more than it would seem. Made with a special absorbent
      material found on the moon's surface, this can is able to hold double its
      storage area, without affecting the water's quality and cleanliness.
    category: "Utility"
    image: "https://ttm.mypinata.cloud/ipfs/QmXuZq1EsSydGLFGbeFF7geSYVWQpQKbyFdocUqJnkrJxt"

  "IS_19":
    name: "IS_19"
    title: "Shovel"
    short: "Shovel in category Utility."
    deep: >
      Designed with a nose of two meeting 45-degree angles, this shovel will
      skilfully pick up the remains of the pick's job. Get ready to dig deep with
      this handy tool.
    category: "Utility"
    image: "https://ttm.mypinata.cloud/ipfs/QmWhAzCdgiDEha9T65qkuqHF9x3FKCroTGhAV3rHAbhZbX"

  "IMPK_20":
    name: "IMPK_20"
    title: "Mining Pick"
    short: "Mining Pick in category Utility."
    deep: >
      Sharper than a great white's teeth, this pick can puncture through any type
      of rock or surface on the moon.
    category: "Utility"
    image: "https://ttm.mypinata.cloud/ipfs/QmcCTCHuPi7gfEPoA1TZNZn1UoBLxGhJrCfgwSUwsYwn3S"

  "IA_21":
    name: "IA_21"
    title: "Axe"
    short: "Axe in category Utility."
    deep: >
      This rare tool allows for the clearing of forest space on Moon Plots to make
      way for Moon Infrastructures. This hatchet is state-of-the-art and is able
      to chop down any tree, no matter its density.
    category: "Utility"
    image: "https://ttm.mypinata.cloud/ipfs/QmcCwXZZXXJFFBYsZtdVU9ncFwjGt92TexGFjFjtzJ8po9"

  "IPOT_22":
    name: "IPOT_22"
    title: "Portable Oxygen Tank"
    short: "Portable Oxygen Tank in category Utility."
    deep: >
      The Portable Oxygen Tank helps Cryptonauts to travel across to the Dark Side
      of the Moon, regardless of atmospheric conditions. This tiny capsule holds
      volumes of compressed gas and will last for hours as Cryptonauts make the
      most of their time there. The use of space aluminium as its main material
      makes it lightweight and portable for those longer journeys.
    category: "Utility"
    image: "https://ttm.mypinata.cloud/ipfs/Qmepse7cBcr2vYnyk1pMezA2UQKQPrA2QZZnxJCsoNtNnH"

  "IOT_23":
    name: "IOT_23"
    title: "Oxygen Tank"
    short: "Oxygen Tank in category Storage."
    deep: >
      This tank is designed to help Cryptonauts learn to increase their natural
      oxygen levels, so that they are ready to make the venture to the other side
      of the moon. Its purpose is for use within the Oxygen Centres.
    category: "Storage"
    image: "https://ttm.mypinata.cloud/ipfs/QmfTdmbZ2uP4NH1312D7e4YdRbFKFBcptnLi6gBUsReLFg"

  "IFB_24":
    name: "IFB_24"
    title: "Food Box"
    short: "Food Box in category Transport."
    deep: >
      Made with extremely durable material- space foam and plastic, this Food Box
      is designed for transporting food of any temperature. It's sleek, solid and
      impermeable to prevent any messes on the moon.
    category: "Transport"
    image: "https://ttm.mypinata.cloud/ipfs/QmZmkbeBDXj3NBFqQrmm2Q23ti1N9LoUBhXnGbLiFMwkBo"

  "ISFB_25":
    name: "ISFB_25"
    title: "Special Food Box"
    short: "The Moon Creatures require Special Food and Special Food requires a Special Box."
    deep: >
      The Moon Creatures require Special Food and Special Food requires a Special
      Box. This trusty capsule is far from your mom's Tupperware, as it's
      specifically engineered to maintain the food's rare, holistic qualities.
    category: "Transport"
    image: "https://ttm.mypinata.cloud/ipfs/QmbwwEYhXbKZVN43gdJDKoNdagDH9rwLbUXPnk3VNDMKd4"

  "IWB_26":
    name: "IWB_26"
    title: "Wheelbarrow"
    short: "Wheelbarrow in category Transport."
    deep: >
      Designed with an even weight distribution, this Wheelbarrow is just as easy
      to manoeuvre when filled to the brim with Gas, as when empty. The use of a
      lightweight space plastic also contributes to this wonderbarrow's
      effectiveness.
    category: "Transport"
    image: "https://ttm.mypinata.cloud/ipfs/QmW9pNpbHeD6RxB3xNhtKGGydb8HJsjEQh4kTJpXzTHf6G"

  "IMC_27":
    name: "IMC_27"
    title: "Mining Cart"
    short: "This fancy, advanced wagon transports the Lithium Moon Rocks."
    deep: >
      This fancy, advanced wagon transports the Lithium Moon Rocks. It is small
      enough to take up the mountains and large enough to hold a substantial
      amount of the special metal.
    category: "Transport"
    image: "https://ttm.mypinata.cloud/ipfs/QmNfs1qxmMokRxmDVU1mGDpiop7FYz59sBhDqUu4yDgDM3"

  "ISB_28":
    name: "ISB_28"
    title: "Special Basket"
    short: "The Special Basket is used to transport the electrical mushrooms."
    deep: >
      The Special Basket is used to transport the electrical mushrooms. It is made
      of a non-conductive material that will maintain the needed energy of its
      contents.
    category: "Transport"
    image: "https://ttm.mypinata.cloud/ipfs/QmNkyehbNy2oYDeJevQ8wSArrFgLj8dhZxFXHborAHPUBo"

  "ISG_29":
    name: "ISG_29"
    title: "Special Gloves"
    short: "Special Gloves in category Transport."
    deep: >
      These Special Gloves allow for the preservation of the fossil's natural
      state through the prevention of disintegration. Fossils are delicate and the
      more intact they are when reaching the Research Labs, the better, which is
      why these particular gloves are essential when it comes to handling them.
    category: "Transport"
    image: "https://ttm.mypinata.cloud/ipfs/QmR35RfcphrvHZrK5i6MgCKmSivKdBLkVn88WsJLr9m2co"

  "ISBG_30":
    name: "ISBG_30"
    title: "Special Bag"
    short: "This rare bag is designed specifically to transport raw moon stones to the Oxygen Centres."
    deep: >
      This rare bag is designed specifically to transport raw moon stones to the
      Oxygen Centres. The magic is safeguarded due to the bag's special material:
      space canvas. Space canvas appears much more solid than earth canvas but
      because of the space cotton and other synthetic fabrics, this bag resembles
      more of a jet pack, than common transportation gear.
    category: "Transport"
    image: "https://ttm.mypinata.cloud/ipfs/QmceU7jAahjFuiejYbdojm6s5izVdw1C2JzN5KjEWkmz1z"

  "IPE_31":
    name: "IPE_31"
    title: "Painting Equipment"
    short: "Painting Equipment in category Tool."
    deep: >
      What would the universe be without a little décor and style? Regardless of
      being black, white and grey, both the brush and ruler spread tasteful design
      all over the Cryptonaut's side of the moon.
    category: "Tool"
    image: "https://ttm.mypinata.cloud/ipfs/QmYAVDiLHkETh3WWd1Et391RS2XBPuuVdVfpBARTeFHabG"

  "ISPD_32":
    name: "ISPD_32"
    title: "Spade"
    short: "This lightweight digger is the most efficient and convenient of the shovel family."
    deep: >
      This lightweight digger is the most efficient and convenient of the shovel
      family. Offering a strong grip, this tool makes any project a breeze.
    category: "Tool"
    image: "https://ttm.mypinata.cloud/ipfs/QmNQhZ1jUWzYbLmipuT5ohrh3eND4NTa44irFuZqmGRr2Z"

  "IBT_33":
    name: "IBT_33"
    title: "Bucket and Trowel"
    short: "Bucket and Trowel in category Tool."
    deep: >
      Impressive masonry is in the details, which is why this duo is a go-to for
      all brick and stonework. Crafted with smooth metal and fine edges, the
      trowel and its other half are essential for any type of construction.
    category: "Tool"
    image: "https://ttm.mypinata.cloud/ipfs/QmPSz5LuvhgQD7irHRBfewAMUF9jsTyjuFguSKr9XxvzPG"

  "IPS_34":
    name: "IPS_34"
    title: "Powered Saw"
    short: "With blades of steel, this tool can seriously slice."
    deep: >
      With blades of steel, this tool can seriously slice. Regardless of its great
      force, ultimate control is part of the package and will be appreciated by
      all masters of saw.
    category: "Tool"
    image: "https://ttm.mypinata.cloud/ipfs/Qmf3M1oYEmN1A9tny47HV5kq8tkBKk4YXHULjSct7g3w6U"

  "IHD_35":
    name: "IHD_35"
    title: "Hammer Drill"
    short: "Hammer Drill in category Tool."
    deep: >
      Able to pierce through concrete, rock, or diamond- the Hammer Drill is a
      must have tool on the moon. Nails included!
    category: "Tool"
    image: "https://ttm.mypinata.cloud/ipfs/QmYkZ5gW5TsQMtmYkooH4Dyr9dd4P5UcmMuV2zASS7oCoe"

  "IWE_36":
    name: "IWE_36"
    title: "Welding Equipment"
    short: "The welding machine is designed to quickly fuse any materials together."
    deep: >
      The welding machine is designed to quickly fuse any materials together.
      Unlike the average equipment, engineered specially for metals, plastics and
      woods, the moon welding machine works on any material imaginable.
    category: "Tool"
    image: "https://ttm.mypinata.cloud/ipfs/QmPMAnDrja53Wfb3K8bqyrwcne8Bsb6ABAXx86W64N9XMz"

  "ITB_37":
    name: "ITB_37"
    title: "Tool Box"
    short: "Tool Box in category Tool."
    deep: >
      Every handy Cryptonaut's dream- this Tool Box holds all the necessities to
      build and fix nearly anything on the moon. Each tool has its own place in
      this all-encompassing set.
    category: "Tool"
    image: "https://ttm.mypinata.cloud/ipfs/QmbcnYe1mivdPoCzF5RzRMpk1qxcRPN2i6tE7qgcXgXqmq"

  "IMCL_38":
    name: "IMCL_38"
    title: "Moon Closet"
    short: "The Moon Closet houses all necessary tools needed to build Moon Infrastructures."
    deep: >
      The Moon Closet houses all necessary tools needed to build Moon
      Infrastructures.
    category: "Tool"
    image: "https://ttm.mypinata.cloud/ipfs/QmURiUk1ab7G5y52bn3MKaJpdrLQwJUkNJqSLBb43feXvz"

  "ISL_39":
    name: "ISL_39"
    title: "Scissor Lift"
    short: "Scissor Lift in category Construction Vehicle."
    deep: >
      Made to reach heights beyond the view from its base, the scissor lift is a
      quick way to get those hard to reach places and build vertical.
    category: "Construction Vehicle"
    image: "https://ttm.mypinata.cloud/ipfs/QmQdA1N6MgDmu1YQR2gJPArFAJyYewK7AkBFQRruura1LZ"

  "IFL_40":
    name: "IFL_40"
    title: "Forklift"
    short: "Forklift in category Construction Vehicle."
    deep: >
      This lightweight champion of a forklift can hold up to nearly 100,000 lbs!
      This is crucial when it comes to transporting material to build.
    category: "Construction Vehicle"
    image: "https://ttm.mypinata.cloud/ipfs/QmT84DgPCqbonKdvTpoU5uiixx7LRHYqZdUtAQxKboez1D"

  "IBH_41":
    name: "IBH_41"
    title: "Backhoe"
    short: "This rear actor is the ultimate excavating machine."
    deep: >
      This rear actor is the ultimate excavating machine. Offering ultimate power
      and precision, this vehicle will be a necessity when it comes to
      construction, demolition, landscaping and breaking through the hardest
      services of the moon.
    category: "Construction Vehicle"
    image: "https://ttm.mypinata.cloud/ipfs/QmSjVoKCbaWZ9hP6HSJEhfYr7ifHfLp5cX4mCDxEo2TuqS"

  "ICMX_42":
    name: "ICMX_42"
    title: "Cement Mixer"
    short: "Producing enough concrete for a metropolitan oasis, this mixer has a motor wattage of 3000."
    deep: >
      Producing enough concrete for a metropolitan oasis, this mixer has a motor
      wattage of 3000. Flawlessly incorporating water and mix in a short period of
      time, this machine produces the most effective, smoothest concrete.
    category: "Construction Vehicle"
    image: "https://ttm.mypinata.cloud/ipfs/QmRe84ZcxKBjdQC3tDbQ3VQUNSJMgGJNd4AyS9D7LxQv9b"

  "IEX_43":
    name: "IEX_43"
    title: "Excavator"
    short: "This tank-like crawler is ideal for the uneven terrain of the moon."
    deep: >
      This tank-like crawler is ideal for the uneven terrain of the moon. Its
      compact look and use of hydraulic power offer stability on tricky surfaces.
    category: "Construction Vehicle"
    image: "https://ttm.mypinata.cloud/ipfs/QmUb7Bv7NyzA19XXTBkpQcA7ncSrbdnViqhSBf63cNYePk"

  "IDT_44":
    name: "IDT_44"
    title: "Dump Truck"
    short: "Dump Truck in category Construction Vehicle."
    deep: >
      Crack proof and rust proof- this dump truck helps transport construction
      materials, waste and just about anything that needs to get from A to B safe
      and secured.
    category: "Construction Vehicle"
    image: "https://ttm.mypinata.cloud/ipfs/QmXzEPpCezA88UW5QfJtTd1k2SQuVMYx217fUUDYq8KNEq"

  "IWCR_45":
    name: "IWCR_45"
    title: "Wheeled Crane"
    short: "Wheeled Crane in category Construction Vehicle."
    deep: >
      The Wheeled Crane can lift up to 18 tons- that's about five Moon Elephants!
      This baby also has the ability to move a full 360 degrees offering complete
      range of motion.
    category: "Construction Vehicle"
    image: "https://ttm.mypinata.cloud/ipfs/QmWUwmyJu4AkU9fXkb496PR8nn8gNfSHyKDD9dmjcQA85p"

  "IHC_46":
    name: "IHC_46"
    title: "Hydraulic crane"
    short: "Hydraulic crane in category Construction Vehicle."
    deep: >
      Due to its internal hydraulic system, this crane can hold up to 50 tons! In
      comparison to the solid Wheeled Crane, that is about 12 and a half Moon
      Elephants, which more than doubles its weight capability.
    category: "Construction Vehicle"
    image: "https://ttm.mypinata.cloud/ipfs/QmQfn2QhxSfkYNcK8tDDeTHDmgMBxPn8MKejMpqg13NyMe"

  "47":
    name: "47"
    title: "Hovercraft"
    short: "Hovercraft in category Hovercraft."
    deep: >
      With its sleek, aerodynamic design, the Hovercraft can pierce through the
      wind with its airfoil composition and low drag shape. It can be upgraded and
      modified to increase Speed, Acceleration, and Control.
    category: "Hovercraft"
    image: null

  "IHCBW_48":
    name: "IHCBW_48"
    title: "HC Balanced Wheel"
    short: "HC Balanced Wheel in category Hovercraft."
    deep: >
      The HC Balanced Wheel is a wheel modification that offers greater Control of
      a Hovercraft, while increasing Speed and Acceleration. All in all, this is
      the most comprehensive modification offered.
    category: "Hovercraft"
    image: "https://ttm.mypinata.cloud/ipfs/Qmdt42JKWRJL4c65BGi9t5zw1jGHTeWnVyqZhJYMQgobKq"

  "IHCSW_49":
    name: "IHCSW_49"
    title: "HC Standard Wheel"
    short: "HC Standard Wheel in category Hovercraft."
    deep: >
      The HC Standard Wheel modification is aimed towards increasing Control of
      the Hovercraft, but unfortunately increases Acceleration time. The grip on
      this wheel is also worth noting as the space leather is perfect for all
      terrain driving control.
    category: "Hovercraft"
